PLG_FULL_CATEGORY_PATH_DESC="<p>Поддерживается <a href=\"https://web-tolk.ru/\" target=\"_blank\" rel=\"noopener noreferrer\">WebTolk</a> для Joomla 5+.</p><p>Если у компонента JoomShopping несколько точек входа через пункты меню, возможны проблемы построения правильного пути и ошибки Too many redirects. Рекомендуется использовать одну точку входа в компонент.</p>"
