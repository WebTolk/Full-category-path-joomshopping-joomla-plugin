PLG_FULL_CATEGORY_PATH_WHATS_NEW="<h3>v.__DEPLOY_VERSION__ Что нового?</h3><p>Плагин переведён на структуру Joomla 5+ с service provider и namespaced runtime-классом.</p><p>Поведение роутинга с полным путём категорий сохранено, а выбор категории в URL товара теперь учитывает режим основной категории JoomShopping, если он включён.</p>"
