PLG_FULL_CATEGORY_PATH_MAYBE_INTERESTING="<h4>Может быть интересно</h4><ul class=\"nav nav-tabs nav-stacked list-group\"><li class=\"list-group-item\"><a href=\"https://web-tolk.ru/dev/web-assets\" target=\"_blank\" title=\"Перейти на https://web-tolk.ru\">Joomla 4 - Joomla 6 Web Assets</a></li><li class=\"list-group-item\"><a href=\"https://web-tolk.ru/dev/joomshopping\" target=\"_blank\" title=\"Перейти на https://web-tolk.ru\">Расширения для JoomShopping</a></li><li class=\"list-group-item\"><a href=\"https://web-tolk.ru/dev/joomla-plugins\" target=\"_blank\" title=\"Перейти на https://web-tolk.ru\">Плагины Joomla</a></li><li class=\"list-group-item\"><a href=\"https://web-tolk.ru/dev/joomla-modules\" target=\"_blank\" title=\"Перейти на https://web-tolk.ru\">Модули Joomla</a></li><li class=\"list-group-item\"><a href=\"https://web-tolk.ru/dev/components\" target=\"_blank\" title=\"Перейти на https://web-tolk.ru\">Компоненты Joomla</a></li><li class=\"list-group-item\"><a href=\"https://web-tolk.ru/dev/biblioteki\" target=\"_blank\" title=\"Перейти на https://web-tolk.ru\">Библиотеки Joomla для разработчиков</a></li></ul>"
PLG_FULL_CATEGORY_PATH_WHATS_NEW="<h3>v.__DEPLOY_VERSION__ Что нового?</h3><p>В библиотеку добавлено поле Joomla 5+ <code>ModalSelect</code> для выбора доступного чата MAX прямо в настройках вашего расширения.</p><p>Пакет WT Max готов к работе: включите системный плагин <code>System - WT Max</code>, укажите токен бота Max в параметрах плагина и проверьте статус подключения в поле <code>Connection status</code>.</p><p><a href=\"index.php?option=com_plugins&view=plugins&filter[search]=WT Max\">Перейти к плагину интеграции.</a></p>"
