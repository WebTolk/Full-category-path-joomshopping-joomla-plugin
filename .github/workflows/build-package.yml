name: Build And Release Joomla Package

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: 'Optional package version. If empty, tag version or package config version is used.'
        required: false
        type: string
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.1'
          extensions: zip
          coverage: none

      - name: Build Joomla package
        shell: bash
        run: |
          set -euo pipefail

          command=(php build/package-github.php --config=.agents/build/package.config.json --output-dir=dist --stage-dir=.packages/.stage/github --github-env="${GITHUB_ENV}")

          if [ -n "${{ inputs.package_version }}" ]; then
            command+=(--version="${{ inputs.package_version }}")
          elif [ "${GITHUB_REF_TYPE:-}" = "tag" ]; then
            command+=(--version="${GITHUB_REF_NAME#v}")
          fi

          "${command[@]}"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ env.PACKAGE_DISPLAY_NAME }} ${{ env.PACKAGE_BUILD_VERSION }}
          tag_name: ${{ env.PACKAGE_RELEASE_TAG }}
          target_commitish: ${{ github.sha }}
          fail_on_unmatched_files: true
          generate_release_notes: true
          files: ${{ env.PACKAGE_FILE }}
